version: '3.8'

services:
  # 1. 後端 AI 推理服務 (FastAPI)
  coffee_backend:
    build: .
    container_name: coffee_backend_service
    # 覆寫 CMD，只啟動 FastAPI 後端
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=host.docker.internal
    restart: always

  # 2. 前端視覺化戰情室 (Streamlit)
  coffee_frontend:
    build: .
    container_name: coffee_frontend_service
    # 覆寫 CMD，只啟動 Streamlit 前端
    command: streamlit run frontend.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    restart: always
    depends_on:
      - coffee_backend # 確保後端啟動後，前端才啟動